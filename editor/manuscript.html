<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manuscript Management</title>

<link rel="stylesheet" href="../style.css">

</head>

<body>

<div class="container">

<div class="header">
<h1>Journal Management System</h1>
<p>Journal of Materials Intelligence and Computing</p>
</div>

<div id="manuscriptInfo" class="card">
Loading manuscript...
</div>

<div class="card">

<h2 id="assignEditorTitle">
Assign Editor
</h2>

<select id="editorSelect">
<option value="">
Select Editor
</option>
</select>

<button 
id="assignEditorButton"
onclick="assignEditor()">
Assign Editor
</button>

<div id="currentEditor"></div>


<h2>Assign Reviewer</h2>

<select 
id="reviewerSelect"
onchange="selectReviewer()">
    <option value="">
        Select Reviewer
    </option>
</select>

<div id="reviewerInfo"
style="
margin:10px 0;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
background:#f9f9f9;">
</div>

<input
type="email"
id="reviewerEmail"
placeholder="Reviewer Email"
readonly>

<input
type="date"
id="reviewDeadline">

<button onclick="assignReviewer()">
Assign Reviewer
</button>

</div>

<div class="card">

<h2>Assigned Reviewers</h2>

<table id="reviewerTable">

<thead>
<tr>
<th>Email</th>
<th>Status</th>
<th>Review Submitted</th>
<th>Deadline</th>
<th>Review Link</th>
<th>Invitation</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<div class="card">

<h2>Reviews Received</h2>

<div id="reviewsContainer">
No reviews yet.
</div>

</div>

<div class="card">

<h2>Editorial Decision</h2>

<select id="decision">

<option>Accept</option>
<option>Minor Revision</option>
<option>Major Revision</option>
<option>Reject</option>

</select>

<br><br>

<textarea
id="decisionRemarks"
rows="5"
placeholder="Remarks">
</textarea>

<br><br>

<button onclick="updateDecision()">
Update Decision
</button>

</div>

</div>

<script src="manuscript.js"></script>

</body>
</html>

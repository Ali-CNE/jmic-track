<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Change Password</title>

<link rel="stylesheet"
href="../style.css">

</head>

<body>

<div class="container">

<h1>Change Password</h1>

<input
type="password"
id="currentPassword"
placeholder="Current Password">

<input
type="password"
id="newPassword"
placeholder="New Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm New Password">

<button onclick="changePassword()">
Update Password
</button>

<div id="message"></div>

</div>

<script src="change-password.js"></script>

</body>

</html>
